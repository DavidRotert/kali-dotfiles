# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 4

final_space: true
shell_integration: true
enable_cursor_positioning: true

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: session
        template: "<{{ if .Root }}lightBlue{{ else }}green{{ end }}>\u250c\u2500\u2500(</>{{ .UserName }}{{ if .Root }}💀{{ else }}㉿{{ end }}{{ .HostName }}<{{ if .Root }}lightBlue{{ else }}green{{ end }}>)</>"
      - type: python
        style: plain
        foreground: yellow
        options:
          fetch_version: false
          fetch_virtual_env: true
        template: "<{{ if .Root }}lightBlue{{ else }}green{{ end }}>-[</>🐍 {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }}{{ end }}{{ .Full }}{{ end }}<{{ if .Root }}lightBlue{{ else }}green{{ end }}>]</>"
      - type: path
        style: plain
        foreground: lightWhite
        options:
          folder_separator_icon: "<#c0c0c0>/</>"
          style: full
        template: "<{{ if .Root }}lightBlue{{ else }}green{{ end }}>-[</>{{ .Path }}<{{ if .Root }}lightBlue{{ else }}green{{ end }}>]</>"
      - type: git
        style: plain
        foreground: white
        template: "<{{ if .Root }}lightBlue{{ else }}green{{ end }}>-[</>{{ .HEAD }}{{ $workingCount := add .Working.Added .Working.Deleted .Working.Modified .Working.Untracked }}{{ if gt $workingCount 0 }} -{{ $workingCount }}{{ end }}{{ $stagingCount := add .Staging.Added .Staging.Deleted .Staging.Modified .Staging.Untracked }}{{ if gt $stagingCount 0 }} +{{ $stagingCount }}{{ end }}{{ $unmergedCount := add .Working.Unmerged .Staging.Unmerged }}{{ if gt $unmergedCount 0 }} x{{ $unmergedCount }}{{ end }}{{ if gt .StashCount 0 }} *{{ .StashCount }}{{ end }}{{ if .BranchStatus }} {{ .BranchStatus }}{{ end }}<{{ if .Root }}lightBlue{{ else }}green{{ end }}>]</>"
        properties:
          fetch_status: true
          fetch_upstream_icon: false
          branch_icon: ""
          branch_identical_icon: ""
          branch_gone_icon: ""
  - type: prompt
    alignment: right
    segments:
      - type: executiontime
        style: plain
        foreground: white
        options:
          always_enabled: true
          style: round
        template: " {{ .FormattedMs }} "
      - type: status
        style: plain
        foreground: green
        foreground_templates:
          - "{{ if gt .Code 0 }}red{{ end }}"
        template: " {{ if gt .Code 0 }}❌{{else}} {{ end }} "
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        foreground: lightBlue
        template: "<{{ if .Root }}lightBlue{{ else }}green{{ end }}>\u2514\u2500</>{{ if .Root }}<lightRed>#</>{{ else }}${{ end }}"

